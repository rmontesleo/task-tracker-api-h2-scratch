name: Basic CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
        

jobs:
  buiild-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Compile Project
        run: ./mvnw -B clean compile

      - name: Run test
        run: ./mvnw -B test

      - name: Build Docker image
        run: |
          DOCKER_BUILDKIT=1 docker build -t task-tacker-api-h2:${{ github.run_number }}-${{ github.sha }} .
          docker images