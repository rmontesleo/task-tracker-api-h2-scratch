# Use this for your laptop/dev environment

spring:
    # DataSource configuration
  datasource:
    url: jdbc:h2:mem:taskdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  sql:
    init:
      mode: always
  
  # H2 Console configuration enabled
  h2:
    console:
      enabled: true
      path: /h2-console

# Logging configuration
# You can add more verbosing logging
logging:
  level:
    root: INFO
    '[com.demo.tasktracker]': DEBUG
    '[org.springframework.web]': INFO
    '[org.hibernate.sql]': DEBUG